<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせフォーム</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .form-container {
            width: 100%;
            max-width: 600px; /* フォームの最大幅を設定 */
            margin: 0 auto;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1); /* 軽い影で視覚的に区切る */
        }
        iframe {
            width: 100%; /* レスポンシブ対応のための幅設定 */
            border: none; /* iframeのボーダーを削除 */
        }
    </style>
</head>
<body>

<h1>お問い合わせ</h1>
<p>以下のフォームからお問い合わせください。</p>

<div class="form-container">
    <!-- Googleフォームの埋め込みコード -->
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfu6wtZuMRzrIP1MB28e8B9oh2DV-Dj40bMjZgk2zHoJzPxYw/viewform?embedded=true" width="640" height="1110" frameborder="0" marginheight="0" marginwidth="0">読み込んでいます…</iframe>
</div>

</body>
</html>
